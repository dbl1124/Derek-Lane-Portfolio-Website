    <style>
      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      
      /* Strictly hide horizontal scrollbar visually */
      ::-webkit-scrollbar:horizontal {
        height: 0px !important;
        width: 0px !important;
        display: none !important;
        opacity: 0 !important;
      }

      ::-webkit-scrollbar-track {
        background: #0a0a0a;
      }
      ::-webkit-scrollbar-thumb {
        background: #333;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #d4fb79;
      }

      /* Ensure the horizontal thumb never shows a color even if hovered */
      ::-webkit-scrollbar-thumb:horizontal {
        background: transparent !important;
        display: none !important;
      }
      
      html {
        /* Removed scroll-behavior: smooth to prevent mobile scroll jank */
        width: 100%;
        height: -webkit-fill-available;
        /* DO NOT ADD overflow-x: hidden here, it breaks sticky in some contexts */
        overscroll-behavior-y: none;
      }
      
      body {
        background-color: #0a0a0a;
        color: #ffffff;
        width: 100%;
        position: relative;
        overflow-anchor: none; /* Fix for mobile scroll jumping */
        overscroll-behavior-y: none;
        
        /* Clip overflow to prevent scrollbars without breaking sticky positioning */
        overflow-x: clip;
        overflow-y: auto;
        
        /* Hint to browser for scroll optimization */
        touch-action: pan-y;
      }

      .glass-panel {
        background: rgba(30, 30, 30, 0.4);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      /* Custom Cursor Handling */
      @media (pointer: fine) {
        body, a, button, input, textarea, select, [role="button"] {
          cursor: none !important;
        }
      }
    </style>
